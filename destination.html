<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destination — Himachal BNB</title>
  <meta name="description" content="Browse and book stays, treks, adventure activities and transport. Verified local operators.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="scroll-progress" id="scroll-progress"></div>

  <main class="bnb-page page-main" id="bnb-main">
    <div class="container">

      <!-- ① Photo Mosaic -->
      <div class="bnb-mosaic" id="bnb-mosaic"></div>

      <!-- ② Destination Header -->
      <div class="bnb-dest-header" id="bnb-dest-header"></div>

      <!-- ③ Search Bar -->
      <div id="bnb-search-container"></div>

      <!-- ④ Category Strip (sticky) -->
      <div class="bnb-category-strip-wrapper">
        <div class="bnb-category-strip" id="bnb-category-strip"></div>
      </div>

      <!-- ⑤ Results count + filters row -->
      <div class="bnb-results-header" id="bnb-results-header"></div>

      <!-- ⑥ Listings Grid -->
      <div class="bnb-listing-grid" id="bnb-listing-grid"></div>

      <!-- ⑦ About Section -->
      <div id="bnb-about-container"></div>

    </div>
  </main>

  <script src="js/data.js" defer></script>
  <script src="js/images.js" defer></script>
  <script src="js/common.js" defer></script>
</body>
</html>
