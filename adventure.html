<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventure — Himachal BNB</title>
  <meta name="description" content="Book adventure activities in Himachal Pradesh — paragliding, trekking, river rafting, snow sports, and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="scroll-progress" id="scroll-progress"></div>
  <main class="page-main">
    <div class="container">
      <div class="ap-page-header" id="ap-page-header">
        <span class="section-label" id="ap-label"></span>
        <h1 id="ap-title"></h1>
        <p id="ap-tagline"></p>
      </div>
    </div>
    <!-- Operators -->
    <section class="ap-operators">
      <div class="container">
        <h2 class="dp-section-heading">Book with <span class="text-gradient">Local Operators</span></h2>
        <div class="sp-grid" id="ap-operators-grid"></div>
      </div>
    </section>
    <!-- Related Treks (for trekking page) -->
    <section class="ap-treks" id="ap-treks-section" style="display:none;">
      <div class="container">
        <h2 class="dp-section-heading">Featured <span class="text-gradient">Treks</span></h2>
        <div class="dp-trek-grid" id="ap-trek-grid"></div>
      </div>
    </section>
    <!-- Where to do it -->
    <section class="ap-where">
      <div class="container">
        <h2 class="dp-section-heading">Best <span class="text-gradient">Locations</span></h2>
        <div class="ap-dest-grid" id="ap-dest-grid"></div>
      </div>
    </section>
    <section class="dp-cta">
      <div class="container" style="text-align:center;">
        <h2 class="dp-section-heading">Ready for <span class="text-gradient">Adventure?</span></h2>
        <p class="dp-section-sub">Plan your adrenaline-packed Himachal trip.</p>
        <a href="planner.html" class="btn btn-primary btn-lg">Plan Your Trip</a>
      </div>
    </section>
  </main>
  <script src="js/data.js" defer></script>
  <script src="js/images.js" defer></script>
  <script src="js/common.js" defer></script>
</body>
</html>
